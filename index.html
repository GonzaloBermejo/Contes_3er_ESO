<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contes de 3er d'ESO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            padding: 10px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #34495e;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            color: #2c3e50;
        }

        section {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .class-section {
            margin-bottom: 40px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="#classe-a">Classe A</a>
            <a href="#classe-b">Classe B</a>
        </nav>
    </header>

    <h1>Contes de 3er d'ESO</h1>

    <section id="classe-a" class="class-section">
        <h2>Classe A</h2>
        <p>Aquí pots afegir els contes de la classe A.</p>
    </section>

    <section id="classe-b" class="class-section">
        <h2>Classe B</h2>
        <p>Aquí pots afegir els contes de la classe B.</p>
    </section>
</body>
</html>
